name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # AQUI ESTÁ O AJUSTE: Injetando as variáveis de ambiente no build
        env:
          VITE_APPSHEET_APP_NAME: ${{ vars.VITE_APPSHEET_APP_NAME }}
          VITE_APPSHEET_TABLE_NAME: ${{ vars.VITE_APPSHEET_TABLE_NAME }}
          # Se o seu app exigir a Access Key para ler os dados, remova o '#' da linha abaixo e use a aba Secrets
          VITE_APPSHEET_ACCESS_KEY: ${{ secrets.VITE_APPSHEET_ACCESS_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4